# Railway deploy config — handover-api
# Set service "Root Directory" = source-code/handover-api in Railway dashboard.
# Env var required: OPENAI_API_KEY

[build]
builder = "nixpacks"
# nixpacks auto-detects Node, runs `npm install` + `npm run build` (tsc → dist/).

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
